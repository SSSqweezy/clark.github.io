<!DOCTYPE html>
<html>

    <title>Clark – Политика конфиденциальности и Условия использования</title>

        body { font-family: sans-serif; max-width: 800px; margin: 40px auto; padding: 20px; line-height: 1.6; }

        hr { margin: 30px 0; }
    </style>
</head>
<body>
    <h1>Политика конфиденциальности приложения Clark</h1>

    <p><em>Дата последнего обновления: 24 марта 2026 г.</em></p>
    <!-- вставь сюда текст условий -->
